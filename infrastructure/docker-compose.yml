services:
  postgres:
    image: postgres:16-alpine
    container_name: cliniqai-postgres
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: cliniqai_dev
      POSTGRES_USER: cliniqai
      POSTGRES_PASSWORD: cliniqai_dev_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cliniqai -d cliniqai_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis/redis-stack:7.4.0-v3
    container_name: cliniqai-redis
    ports:
      - "6380:6379"
      - "8001:8001"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cliniqai-pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: dev@cliniqai.com
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
